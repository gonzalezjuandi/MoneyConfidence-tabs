<ng-container [ngSwitch]="variant">
  <!-- Asisa: círculo azul oscuro + wordmark -->
  <span *ngSwitchCase="'asisa'" class="upl" [class.upl--sm]="size === 'sm'" [class.upl--lg]="size === 'lg'" aria-hidden="true">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#0a2744" />
      <text
        x="20"
        y="24"
        text-anchor="middle"
        fill="#ffffff"
        font-size="8.5"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700"
      >
        asisa
      </text>
      <text
        x="30"
        y="15"
        fill="#ffffff"
        font-size="6.5"
        font-family="system-ui, sans-serif"
        font-weight="700"
      >
        +
      </text>
    </svg>
  </span>

  <!-- Préstamos: azul vivo + "os" -->
  <span *ngSwitchCase="'prestamos'" class="upl" [class.upl--sm]="size === 'sm'" [class.upl--lg]="size === 'lg'" aria-hidden="true">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#0095ff" />
      <text
        x="20"
        y="26"
        text-anchor="middle"
        fill="#ffffff"
        font-size="15"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="700"
      >
        os
      </text>
    </svg>
  </span>

  <!-- Aguas Barcelona: ondas -->
  <span *ngSwitchCase="'aguas'" class="upl" [class.upl--sm]="size === 'sm'" [class.upl--lg]="size === 'lg'" aria-hidden="true">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#003b73" />
      <path
        d="M6 14.5c2.2-1.2 4.2-1.2 6.4 0s4.2 1.2 6.4 0 4.2-1.2 6.4 0 4.2 1.2 6.4 0 4.2-1.2 6.4 0"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.35"
        stroke-linecap="round"
      />
      <path
        d="M6 20c2.2-1.2 4.2-1.2 6.4 0s4.2 1.2 6.4 0 4.2-1.2 6.4 0 4.2 1.2 6.4 0 4.2-1.2 6.4 0 4.2 1.2 6.4 0"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.35"
        stroke-linecap="round"
      />
      <path
        d="M6 25.5c2.2-1.2 4.2-1.2 6.4 0s4.2 1.2 6.4 0 4.2-1.2 6.4 0 4.2 1.2 6.4 0 4.2-1.2 6.4 0 4.2 1.2 6.4 0"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.35"
        stroke-linecap="round"
      />
    </svg>
  </span>

  <!-- Telecom / fibra: círculo + wifi -->
  <span *ngSwitchCase="'telecom'" class="upl" [class.upl--sm]="size === 'sm'" [class.upl--lg]="size === 'lg'" aria-hidden="true">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#1e3a5f" />
      <path
        d="M20 24.5a1.8 1.8 0 1 0 0 3.6 1.8 1.8 0 0 0 0-3.6z"
        fill="#ffffff"
      />
      <path
        d="M12.2 18.2c2.1-2.1 4.9-3.2 7.8-3.2s5.7 1.1 7.8 3.2"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.35"
        stroke-linecap="round"
        opacity="0.95"
      />
      <path
        d="M15 21c1.4-1.4 3.2-2.1 5-2.1s3.6.7 5 2.1"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.35"
        stroke-linecap="round"
        opacity="0.85"
      />
    </svg>
  </span>

</ng-container>
