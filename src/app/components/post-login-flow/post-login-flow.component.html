<!-- Splash -->
<div class="post-login-root" *ngIf="phase === 'splash'">
  <div class="splash-screen">
    <img src="assets/sabadell-logo.png" alt="Banco Sabadell" class="splash-logo" />
  </div>
</div>

<!-- Loading -->
<div class="post-login-root post-login-loading" *ngIf="phase === 'loading'">
  <div class="loading-inner">
    <div class="loading-spinner" aria-hidden="true"></div>
    <p class="loading-text">
      Estamos preparando los detalles. Solo nos llevará unos segundos. ¡No te vayas!
    </p>
  </div>
</div>

<!-- Modal alerta (full-screen, Money Confidence MVP / Figma 6325:96615) -->
<div class="post-login-root modal-phase" *ngIf="phase === 'modal'">
  <div class="alert-modal" role="dialog" aria-labelledby="alert-title" aria-modal="true">
    <header class="alert-modal-header">
      <button
        type="button"
        class="btn-alert-close"
        (click)="onSkip()"
        aria-label="Cerrar"
      >
        <i data-lucide="x" class="alert-close-icon"></i>
      </button>
    </header>
    <div class="alert-modal-body">
      <div class="alert-modal-icon-wrap" aria-hidden="true">
        <img
          src="assets/alert-proximos-calendar.png"
          alt=""
          width="120"
          height="120"
          class="alert-bell-img"
        />
      </div>
      <h2 id="alert-title" class="alert-title">Revisa tus próximos pagos</h2>
      <div class="alert-body">
        <p>
          En los próximos 10 días se esperan 5 cargos que
          <strong>podrían dejar tu cuenta en negativo.</strong>
        </p>
        <p>Revisa los pagos previstos y evita sustos.</p>
      </div>
    </div>
    <footer class="alert-modal-footer">
      <button type="button" class="btn-alert-primary" (click)="onReview()">
        Revisar Próximos pagos
      </button>
      <button type="button" class="btn-alert-secondary" (click)="onSkip()">Ahora no</button>
    </footer>
  </div>
</div>
