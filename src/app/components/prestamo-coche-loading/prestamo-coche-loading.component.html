<div class="loading-screen-overlay">
  <div class="loading-screen-container">
    <div class="loading-spinner">
      <svg class="spinner-circle" viewBox="0 0 50 50">
        <circle class="spinner-path" cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"></circle>
      </svg>
    </div>
    <h2 class="loading-title">{{ message }}</h2>
    <ul class="loading-items" *ngIf="items && items.length > 0">
      <li class="loading-item" 
          *ngFor="let item of items; let i = index"
          [style.animation-delay]="(i * 0.3) + 's'"
          [class.fade-in]="true">{{ item }}</li>
    </ul>
    <p class="loading-subtitle">{{ subtitle || 'Solo nos llevará unos segundos ¡No te vayas!' }}</p>
  </div>
</div>
