<div class="nl-root" role="presentation">
  <div class="nl-status">
    <span class="nl-time">9:41</span>
    <div class="nl-status-icons" aria-hidden="true">
      <i data-lucide="signal" class="nl-si"></i>
      <i data-lucide="wifi" class="nl-si"></i>
      <i data-lucide="battery-full" class="nl-si"></i>
    </div>
  </div>

  <button
    type="button"
    class="nl-push-card"
    (click)="onOpenNotification()"
    aria-label="Abrir: Se acercan varios pagos en los próximos días"
  >
    <div class="nl-push-icon" aria-hidden="true">
      <img
        src="assets/banco-sabadell-logo-mark.png"
        alt=""
        class="nl-push-icon-img"
        decoding="async"
      />
    </div>
    <div class="nl-push-body">
      <div class="nl-push-header">
        <span class="nl-push-app">Banco Sabadell</span>
        <span class="nl-push-time">ahora</span>
      </div>
      <p class="nl-push-text">Se acercan varios pagos en los próximos días. Revisa tu saldo.</p>
    </div>
  </button>

  <div class="nl-bottom-area">
    <div class="nl-flash"></div>
    <div class="nl-bar"></div>
  </div>
</div>
